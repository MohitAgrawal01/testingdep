name: Check itstesting.txt exists
on:
  pull_requests:
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  check-itstesting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for itstesting.txt
        id: check_file
        run: |
          if [ ! -f "testingdep/itstesting.txt" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
          else
            echo "missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Comment on PR if missing
        if: steps.check_file.outputs.missing == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ File `itstesting.txt` is missing in `testingdep/`. Please add it to proceed.'
            })

      - name: Fail if file missing
        if: steps.check_file.outputs.missing == 'true'
        run: |
          echo "File itstesting.txt is missing. Blocking merge." && exit 1
