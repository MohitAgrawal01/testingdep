name: Check itstesting.txt exists
on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  issues: write
  pull-requests: write

jobs:
  check-itstesting:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for itstesting.txt
        id: check_file
        run: |
          if [ ! -f "testingdep/itstesting.txt" ]; then
            echo "missing=true" >> $GITHUB_OUTPUT
          else
            echo "missing=false" >> $GITHUB_OUTPUT
          fi

      - name: Request changes on PR if missing
        if: steps.check_file.outputs.missing == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.MOHIT_GITHUB_TOKEN }}
          script: |
            github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
              event: 'REQUEST_CHANGES',
              body: '❌ File `itstesting.txt` is missing in `testingdep/`. Please add it to proceed.'
            })

      - name: Fail if file missing
        if: steps.check_file.outputs.missing == 'true'
        run: |
          echo "File itstesting.txt is missing. Blocking merge." && exit 1
